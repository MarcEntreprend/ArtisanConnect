    <!-- supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/data/artisans.js"></script>
    <script src="js/data/dashboard-mock.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadTheme();
      loadIncludes({ activePage: "dashboard.html" });
      const IS_FIRST_LOGIN = true;

      const ob = {
        step: 1,
        type: null,
        category: null,
        service: { name: "", price: "", duration: "" },
      };

      function renderStep() {
        const modal = document.getElementById("onboardingModal");
        if (!IS_FIRST_LOGIN) {
          window.location.href = "dashboard.html";
          return;
        }

        const dots = [1, 2, 3]
          .map(
            (n) =>
              `<div class="onboarding-step-dot ${n === ob.step ? "active" : n < ob.step ? "done" : ""}"></div>`,
          )
          .join("");

        if (ob.step === 1) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Bienvenue 👋</div>
            <div class="onboarding-subtitle">Pour personnaliser votre espace, dites-nous qui vous êtes.</div>
            <div class="onboarding-choice-grid">
              <div class="onboarding-choice ${ob.type === "solo" ? "selected" : ""}" data-type="solo">
                <div class="onboarding-choice-icon">🧑‍🔧</div>
                <div class="onboarding-choice-label">Artisan indépendant</div>
                <div class="onboarding-choice-sub">Je travaille seul</div>
              </div>
              <div class="onboarding-choice ${ob.type === "entreprise" ? "selected" : ""}" data-type="entreprise">
                <div class="onboarding-choice-icon">🏪</div>
                <div class="onboarding-choice-label">Entreprise ou salon</div>
                <div class="onboarding-choice-sub">J'ai une équipe</div>
              </div>
            </div>
            <div class="onboarding-actions">
              <span style="font-size:.8rem;color:var(--ink-faint);">Étape 1 sur 3</span>
              <button type="button" class="btn btn-primary" id="obNext1" ${!ob.type ? "disabled" : ""}>Continuer →</button>
            </div>`;

          modal.querySelectorAll(".onboarding-choice").forEach((el) => {
            el.addEventListener("click", () => {
              ob.type = el.dataset.type;
              renderStep();
            });
          });
          modal.querySelector("#obNext1").addEventListener("click", () => {
            ob.step = 2;
            renderStep();
          });
        } else if (ob.step === 2) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Votre métier</div>
            <div class="onboarding-subtitle">Quel est votre métier principal ? Vous pourrez en ajouter d'autres plus tard.</div>
            <div class="onboarding-field">
              <label>Choisissez votre métier</label>
              <select id="obCatSelect">
                <option value="">— Sélectionner —</option>
                ${CATEGORIES.map((c) => `<option value="${c.slug}" ${ob.category === c.slug ? "selected" : ""}>${c.label}</option>`).join("")}
              </select>
            </div>
            <div class="onboarding-actions">
              <button type="button" class="btn btn-ghost" id="obBack2">← Retour</button>
              <button type="button" class="btn btn-primary" id="obNext2" ${!ob.category ? "disabled" : ""}>Continuer →</button>
            </div>`;

          const sel = modal.querySelector("#obCatSelect");
          const next2 = modal.querySelector("#obNext2");
          sel.addEventListener("change", () => {
            ob.category = sel.value;
            next2.disabled = !ob.category;
          });
          modal.querySelector("#obBack2").addEventListener("click", () => {
            ob.step = 1;
            renderStep();
          });
          next2.addEventListener("click", () => {
            ob.step = 3;
            renderStep();
          });
        } else if (ob.step === 3) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Votre premier service</div>
            <div class="onboarding-subtitle">Ajoutez au moins un service pour que les clients puissent vous réserver.</div>
            <div class="onboarding-field">
              <label>Nom du service</label>
              <input type="text" id="obSvcName" placeholder="Ex. Coupe de cheveux" value="${ob.service.name}" />
            </div>
            <div class="onboarding-field">
              <label>Prix (Gourdes)</label>
              <input type="number" id="obSvcPrice" placeholder="Ex. 2500" value="${ob.service.price}" min="0" step="500" />
            </div>
            <div class="onboarding-field">
              <label>Durée (minutes)</label>
              <input type="number" id="obSvcDuration" placeholder="Ex. 30" value="${ob.service.duration}" min="5" step="5" />
            </div>
            <div class="onboarding-actions">
              <button type="button" class="btn btn-ghost" id="obBack3">← Retour</button>
              <button type="button" class="btn btn-primary" id="obFinish">Commencer 🎉</button>
            </div>`;

          modal.querySelector("#obBack3").addEventListener("click", () => {
            ob.step = 2;
            renderStep();
          });
          modal
            .querySelector("#obFinish")
            .addEventListener("click", async () => {
              const name = modal.querySelector("#obSvcName").value.trim();
              const price = Number(modal.querySelector("#obSvcPrice").value);
              const duration = Number(
                modal.querySelector("#obSvcDuration").value,
              );
              if (!name) {
                modal.querySelector("#obSvcName").focus();
                return;
              }

              const personaKey =
                ob.type === "entreprise" ? "responsable" : "solo";
              const artisanId = ob.type === "entreprise" ? 7 : 1;
              const artisan = artisansData.find((a) => a.id === artisanId);

              if (artisan && name) {
                artisan.services.unshift({
                  id: Date.now(),
                  name,
                  desc: "",
                  price,
                  duration,
                  image: artisan.avatar,
                  active: true,
                });
              }

              const { data: authData } = await SupabaseAPI.auth.getSession();
              const session = authData?.session || null;
              if (session?.user && artisanId) {
                try {
                  await SupabaseAPI.services.create({
                    artisan_id: artisanId,
                    name,
                    price,
                    duration_min: duration,
                    is_active: true,
                  });
                } catch (e) {
                  console.warn(
                    "Création service Supabase échouée, mock uniquement :",
                    e.message,
                  );
                }
              }

              window.location.href = `dashboard.html?persona=${personaKey}`;
            });
        }
      }

      loadIncludes({ activePage: "dashboard.html" });
      renderStep();
    </script>
  </body>
</html>
