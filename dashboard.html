<!-- dashboard.html -->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Espace artisan — ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Aller au contenu</a>
    <div id="header-container"></div>

    <main class="main-content" id="main">
      <div class="container">
        <div class="page-header">
          <h1 id="dashTitle">Espace artisan</h1>
          <p id="dashSubtitle">
            Gérez votre vitrine, vos services et vos disponibilités.
          </p>
        </div>

        <div id="companyBannerSlot"></div>
        <div id="modeSwitchSlot"></div>

        <div class="dash-shell">
          <aside class="dash-sidebar">
            <div class="dash-profile-mini" id="dashProfileMini"></div>
            <nav class="dash-nav" id="dashNav"></nav>
          </aside>

          <div id="dashPanels">
            <!-- panneau actif injecté par js/dashboard.js -->
          </div>
        </div>
      </div>
    </main>

    <footer class="dash-demo-footer">
      <div class="container dash-demo-footer-inner">
        <div class="dash-demo-left">
          <span class="dash-demo-badge">Mode démo</span>
          <nav class="dash-persona-switcher" aria-label="Changer de vue démo">
            <a href="dashboard.html?persona=solo" data-persona="solo"
              >Vue solo</a
            >
            <span class="sep">|</span>
            <a
              href="dashboard.html?persona=responsable"
              data-persona="responsable"
              >Vue responsable</a
            >
            <span class="sep">|</span>
            <a href="dashboard.html?persona=employe" data-persona="employe"
              >Vue employé</a
            >
          </nav>
        </div>
        <button class="back-to-top" aria-label="Retourner en haut de la page">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="m4 12 1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z" />
          </svg>
        </button>
      </div>
    </footer>

    <div id="booking-modal-container"></div>
    <div id="login-modal-container"></div>
    <div class="toast-stack" id="toastStack"></div>

    <script src="js/data/artisans.js"></script>
    <script src="js/data/dashboard-mock.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
      loadIncludes({ activePage: "dashboard.html" });
      initDashboard();
    </script>
  </body>
</html>
