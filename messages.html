<!-- messages.html -->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messagerie — ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Aller au contenu</a>
    <div id="header-container"></div>

    <main class="main-content" id="main">
      <div class="container">
        <div class="page-header">
          <h1>Messagerie</h1>
          <p>
            Échangez directement avec les artisans avant et après vos
            rendez-vous.
          </p>
        </div>

        <div class="messages-layout" id="messagesLayout">
          <div class="conv-list mobile-visible" id="convList"></div>

          <div class="thread-panel mobile-hidden" id="threadPanel">
            <!-- injecté par JS -->
          </div>
        </div>
      </div>
    </main>

    <div id="bottom-nav-container"></div>
    <div id="booking-modal-container"></div>
    <div id="login-modal-container"></div>
    <div class="toast-stack" id="toastStack"></div>

    <!-- mock -->
    <!-- <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadIncludes({ activePage: "messages.html" });
      initMessagingPage();
    </script> -->

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>

    <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadIncludes({ activePage: "messages.html" });

      function showMessagesLoginWall() {
        const layout = document.getElementById("messagesLayout");
        if (!layout) return;
        layout.innerHTML = `
          <div class="empty-illustrated" style="grid-column:1/-1;padding:4rem 1.5rem;">
            <div class="empty-illustrated-emoji">💬</div>
            <h3>Connectez-vous pour accéder à vos messages</h3>
            <p>Retrouvez ici vos échanges avec les artisans avant et après vos rendez-vous.</p>
            <a href="auth.html" class="btn btn-primary" style="margin-top:1.5rem;">Se connecter</a>
          </div>`;
      }

      async function loadMessagesSupabase() {
        let session = null;
        try {
          const { data } = await SupabaseAPI.auth.getSession();
          session = data?.session || null;
        } catch (e) {
          console.warn("Session check failed:", e.message);
        }

        if (!session?.user) {
          // Non connecté → afficher mock + bandeau de connexion
          showMessagesLoginWall();
          return;
        }

        // Connecté → charger depuis Supabase
        try {
          const { user: profile } = await SupabaseAPI.auth.getUser();
          const role = profile?.role || "client";

          let artisanId = null;

          // Fix D3 : pour un artisan, on doit d'abord résoudre l'artisan_id
          // depuis owner_id, puis filtrer les conversations par cet artisan_id (INT).
          // On ne peut pas comparer artisan_id (INT) directement avec userId (UUID).
          if (role !== "client") {
            try {
              const { data: artisans } = await SupabaseAPI.artisans.getByOwner(
                session.user.id,
              );
              if (artisans && artisans.length > 0) {
                artisanId = artisans[0].id;
              }
            } catch (e) {
              console.warn("artisan lookup failed:", e.message);
            }
          }

          const { data: conversations, error: convErr } =
            await SupabaseAPI.messages.getConversations(
              role === "client" ? session.user.id : artisanId,
              role,
            );

          if (!convErr && conversations && conversations.length > 0) {
            window.conversationsData = [];

            for (const c of conversations) {
              let msgs = [];
              try {
                const { data: msgData } =
                  await SupabaseAPI.messages.getMessages(c.id);
                msgs = msgData || [];
              } catch (e) {
                console.warn("messages load for conv", c.id, ":", e.message);
              }

              window.conversationsData.push({
                id: c.id,
                artisanId: c.artisan_id,
                unread: msgs.some((m) => !m.is_read && m.sender_type !== role),
                messages: msgs.map((m) => ({
                  from: m.sender_type === role ? "me" : "them",
                  text: m.content,
                  time: new Date(m.created_at).toLocaleTimeString("fr-FR", {
                    hour: "2-digit",
                    minute: "2-digit",
                  }),
                })),
              });
            }
          } else {
            // Connecté mais aucune conversation
            window.conversationsData = [];
          }
        } catch (e) {
          console.warn("Messages load failed, fallback mock:", e.message);
        }

        initMessagingPage();
      }

      loadMessagesSupabase();
    </script>
  </body>
</html>
