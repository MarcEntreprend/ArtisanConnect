<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rechercher un artisan — ArtisanConnect</title>
    <meta
      name="description"
      content="Filtrez par métier, ville, note et disponibilité pour trouver l'artisan qu'il vous faut."
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Aller au contenu</a>
    <div id="header-container"></div>

    <main class="main-content" id="main">
      <div class="container">
        <div class="search-page-header">
          <h1>Trouver un artisan</h1>
          <div
            class="search-container"
            style="margin-top: 1.1rem; max-width: 640px"
          >
            <div class="search-box">
              <svg
                class="search-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input
                type="search"
                class="search-input"
                placeholder="Un métier, une ville, un nom d'artisan…"
                maxlength="50"
                id="advancedSearchInput"
              />
            </div>
          </div>
        </div>

        <div class="search-layout">
          <!-- ===== FILTRES ===== -->
          <aside class="filter-panel" id="filterPanel">
            <div class="filter-block">
              <h3>Métier</h3>
              <div id="filterCategories"></div>
            </div>

            <div class="filter-block">
              <h3>Ville</h3>
              <div id="filterCities"></div>
            </div>

            <div class="filter-block">
              <h3>Note minimale</h3>
              <div id="filterRating"></div>
            </div>

            <div class="filter-block">
              <h3>Budget max</h3>
              <input
                type="range"
                class="filter-range"
                id="filterPrice"
                min="0"
                max="65000"
                step="1000"
                value="65000"
              />
              <div class="filter-range-value">
                <span>0 Gourdes</span>
                <span id="filterPriceValue">65 000 Gourdes</span>
              </div>
            </div>

            <div class="filter-block">
              <label class="filter-check">
                <input type="checkbox" id="filterAvailableToday" />
                Disponible aujourd'hui uniquement
              </label>
            </div>

            <button class="filter-reset" id="filterReset">
              Réinitialiser les filtres
            </button>
          </aside>

          <!-- ===== RÉSULTATS ===== -->
          <div>
            <div class="search-toolbar">
              <button class="mobile-filter-btn" id="mobileFilterToggle">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M4 6h16M7 12h10M10 18h4" />
                </svg>
                Filtres
              </button>
              <p class="search-toolbar-count">
                <strong id="searchResultCount">0</strong> artisans trouvés
              </p>
              <select class="sort-select" id="sortSelect">
                <option value="pertinence">Pertinence</option>
                <option value="rating">Meilleure note</option>
                <option value="price-asc">Prix croissant</option>
                <option value="distance">Distance</option>
              </select>
            </div>

            <div class="artisans-grid stagger" id="searchResultsGrid"></div>

            <div
              class="empty-state"
              id="searchEmptyState"
              style="display: none"
            >
              <div class="empty-state-icon">
                <svg
                  width="28"
                  height="28"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <circle cx="11" cy="11" r="8" />
                  <path d="m21 21-4.35-4.35" />
                </svg>
              </div>
              <h3>Aucun résultat</h3>
              <p>
                Essayez d'élargir vos filtres ou de rechercher un autre métier.
              </p>
              <button class="btn btn-outline" id="searchEmptyReset">
                Réinitialiser les filtres
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom" style="margin-top: 0; padding-top: 1.5rem">
          <p>© 2026 ArtisanConnect. Tous droits réservés.</p>
          <button class="back-to-top" aria-label="Retourner en haut de la page">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="m4 12 1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z"
              />
            </svg>
          </button>
        </div>
      </div>
    </footer>

    <div id="bottom-nav-container"></div>
    <div id="booking-modal-container"></div>
    <div id="login-modal-container"></div>
    <div class="toast-stack" id="toastStack"></div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>

    <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadIncludes({ activePage: "search.html" });

      async function initAdvancedSearchSupabase() {
        const params = new URLSearchParams(window.location.search);
        const query = params.get("q") || "";
        if (query) document.getElementById("advancedSearchInput").value = query;

        // Tente Supabase, fallback mock si indisponible
        try {
          const filters = {};
          if (query) filters.search = query;
          const { data, error } = await SupabaseAPI.artisans.getAll(filters);
          if (!error && data && data.length > 0) {
            // Remplace la source de données globale pour cette page
            window.artisansData = data;
          }
        } catch (e) {
          console.warn("Supabase indisponible, fallback mock :", e.message);
        }

        initAdvancedSearch();
      }

      initAdvancedSearchSupabase();
    </script>
  </body>
</html>
