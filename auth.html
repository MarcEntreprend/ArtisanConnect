<!-- auth.html -->

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body
    style="
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    "
  >
    <div
      style="
        width: 100%;
        max-width: 440px;
        background: var(--bg-elevated);
        border-radius: var(--r-card);
        padding: 2.5rem 2rem;
        box-shadow: var(--shadow-lg);
        border: 1px solid var(--border);
        position: relative;
      "
    >
      <!-- Flèche retour -->
      <a
        href="index.html"
        id="backArrow"
        style="
          position: absolute;
          top: 1.25rem;
          left: 1.25rem;
          display: inline-flex;
          align-items: center;
          justify-content: center;
          width: 36px;
          height: 36px;
          border-radius: 50%;
          color: var(--ink-soft);
          background: transparent;
          text-decoration: none;
          transition:
            background 0.2s,
            color 0.2s;
        "
        onmouseover="
          this.style.background = 'var(--bg-sunken)';
          this.style.color = 'var(--ink)';
        "
        onmouseout="
          this.style.background = 'transparent';
          this.style.color = 'var(--ink-soft)';
        "
        aria-label="Retour à l'accueil"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
      </a>

      <div id="authForms">
        <!-- ========== CONNEXION ========== -->
        <form id="loginForm" style="display: block">
          <h2
            style="
              font-size: 1.5rem;
              font-weight: 700;
              margin-bottom: 0.25rem;
              text-align: center;
            "
          >
            Se connecter
          </h2>
          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              color: var(--ink-faint);
              margin-bottom: 2rem;
            "
          >
            Accédez à votre espace ArtisanConnect.
          </p>

          <div class="dash-field" style="margin-bottom: 1.25rem">
            <label>Email</label>
            <input type="email" id="loginEmail" required />
          </div>

          <div class="dash-field" style="margin-bottom: 1.75rem">
            <label>Mot de passe</label>
            <input type="password" id="loginPassword" required />
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; margin-bottom: 1.25rem"
          >
            Connexion
          </button>

          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              margin-bottom: 0.5rem;
            "
          >
            <a
              href="#"
              id="showSignup"
              style="
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
              "
              >Créer un compte</a
            >
            <span style="color: var(--ink-faint); margin: 0 0.4rem">·</span>
            <a
              href="#"
              id="showRecover"
              style="
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
              "
              >Mot de passe oublié</a
            >
          </p>

          <div
            id="loginError"
            style="
              color: var(--danger);
              font-size: 0.8rem;
              text-align: center;
              margin-top: 0.5rem;
              min-height: 1.2rem;
            "
          ></div>
        </form>

        <!-- ========== INSCRIPTION ========== -->
        <form id="signupForm" style="display: none">
          <h2
            style="
              font-size: 1.5rem;
              font-weight: 700;
              margin-bottom: 0.25rem;
              text-align: center;
            "
          >
            Créer un compte
          </h2>
          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              color: var(--ink-faint);
              margin-bottom: 2rem;
            "
          >
            Rejoignez ArtisanConnect en quelques secondes.
          </p>

          <div class="dash-field" style="margin-bottom: 1.25rem">
            <label>Nom complet</label>
            <input type="text" id="signupName" required />
          </div>

          <div class="dash-field" style="margin-bottom: 1.25rem">
            <label>Email</label>
            <input type="email" id="signupEmail" required />
          </div>

          <div class="dash-field" style="margin-bottom: 1.25rem">
            <label>Mot de passe</label>
            <input type="password" id="signupPassword" required minlength="6" />
          </div>

          <div class="dash-field" style="margin-bottom: 1.75rem">
            <label>Vous êtes ?</label>
            <select id="signupRole">
              <option value="client">Client</option>
              <option value="artisan_solo">Artisan indépendant</option>
              <option value="responsable">Responsable d'entreprise</option>
              <option value="employe">Employé</option>
            </select>
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; margin-bottom: 1.25rem"
          >
            S'inscrire
          </button>

          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              margin-bottom: 0.5rem;
            "
          >
            <a
              href="#"
              id="showLogin"
              style="
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
              "
              >Déjà un compte ? Connectez-vous</a
            >
          </p>

          <div
            id="signupError"
            style="
              color: var(--danger);
              font-size: 0.8rem;
              text-align: center;
              margin-top: 0.5rem;
              min-height: 1.2rem;
            "
          ></div>
        </form>

        <!-- ========== RÉCUPÉRATION ========== -->
        <form id="recoverForm" style="display: none">
          <h2
            style="
              font-size: 1.5rem;
              font-weight: 700;
              margin-bottom: 0.25rem;
              text-align: center;
            "
          >
            Mot de passe oublié
          </h2>
          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              color: var(--ink-faint);
              margin-bottom: 2rem;
            "
          >
            Recevez un lien de réinitialisation par email.
          </p>

          <div class="dash-field" style="margin-bottom: 1.75rem">
            <label>Email</label>
            <input type="email" id="recoverEmail" required />
          </div>

          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; margin-bottom: 1.25rem"
          >
            Envoyer le lien
          </button>

          <p
            style="
              text-align: center;
              font-size: 0.85rem;
              margin-bottom: 0.5rem;
            "
          >
            <a
              href="#"
              id="showLoginFromRecover"
              style="
                color: var(--accent);
                text-decoration: none;
                font-weight: 500;
              "
              >Retour à la connexion</a
            >
          </p>

          <div
            id="recoverMsg"
            style="
              color: var(--accent);
              font-size: 0.8rem;
              text-align: center;
              margin-top: 0.5rem;
              min-height: 1.2rem;
            "
          ></div>
          <div
            id="recoverError"
            style="
              color: var(--danger);
              font-size: 0.8rem;
              text-align: center;
              margin-top: 0.25rem;
              min-height: 1.2rem;
            "
          ></div>
        </form>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadTheme();

      // Logique de la flèche retour : revient à la page précédente ou index
      document
        .getElementById("backArrow")
        .addEventListener("click", function (e) {
          if (
            document.referrer &&
            document.referrer.includes(window.location.host)
          ) {
            // On vient du site, on retourne en arrière
            return; // laisse le href="index.html" comme fallback, ou utilise history.back()
          }
          // Sinon, on va vers index.html (comportement par défaut du href)
        });

      // Si on veut un vrai "retour en arrière" quand on vient du site :
      (function () {
        if (
          document.referrer &&
          document.referrer.includes(window.location.host)
        ) {
          document.getElementById("backArrow").href =
            "javascript:history.back()";
        }
      })();

      document.getElementById("showSignup").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("signupForm").style.display = "block";
      });
      document.getElementById("showLogin").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("signupForm").style.display = "none";
        document.getElementById("loginForm").style.display = "block";
      });
      document.getElementById("showRecover").addEventListener("click", (e) => {
        e.preventDefault();
        document.getElementById("loginForm").style.display = "none";
        document.getElementById("recoverForm").style.display = "block";
      });
      document
        .getElementById("showLoginFromRecover")
        .addEventListener("click", (e) => {
          e.preventDefault();
          document.getElementById("recoverForm").style.display = "none";
          document.getElementById("loginForm").style.display = "block";
        });

      // Connexion
      document
        .getElementById("loginForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button[type=submit]");
          btn.disabled = true;
          btn.textContent = "Connexion…";
          const { error } = await SupabaseAPI.auth.signIn(
            document.getElementById("loginEmail").value,
            document.getElementById("loginPassword").value,
          );
          if (error) {
            document.getElementById("loginError").textContent = error.message;
            btn.disabled = false;
            btn.textContent = "Connexion";
          } else {
            window.location.href = "index.html";
          }
        });

      // Inscription
      document
        .getElementById("signupForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const btn = e.target.querySelector("button[type=submit]");
          btn.disabled = true;
          btn.textContent = "Création…";
          const name = document.getElementById("signupName").value.trim();
          const email = document.getElementById("signupEmail").value;
          const password = document.getElementById("signupPassword").value;
          const role = document.getElementById("signupRole").value;
          if (!name) {
            document.getElementById("signupError").textContent =
              "Veuillez indiquer votre nom.";
            btn.disabled = false;
            btn.textContent = "S'inscrire";
            return;
          }
          const { error } = await SupabaseAPI.auth.signUp(
            email,
            password,
            name,
            role,
          );
          if (error) {
            document.getElementById("signupError").textContent = error.message;
            btn.disabled = false;
            btn.textContent = "S'inscrire";
          } else {
            const redir =
              role === "artisan_solo" ||
              role === "responsable" ||
              role === "employe"
                ? "onboarding.html"
                : "index.html";
            window.location.href = redir;
          }
        });

      // Récupération
      document
        .getElementById("recoverForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = document.getElementById("recoverEmail").value;
          const { error } = await SupabaseAPI.auth.resetPassword(email);
          if (error) {
            document.getElementById("recoverError").textContent = error.message;
          } else {
            document.getElementById("recoverMsg").textContent =
              "Un lien de réinitialisation a été envoyé à votre adresse email.";
            document.getElementById("recoverError").textContent = "";
          }
        });
    </script>
  </body>
</html>
