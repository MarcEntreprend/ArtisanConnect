<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mes rendez-vous — ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <a href="#main" class="skip-link">Aller au contenu</a>
    <div id="header-container"></div>

    <main class="main-content" id="main">
      <div class="container">
        <div class="page-header">
          <h1>Mes rendez-vous</h1>
          <p>Suivez vos réservations passées et à venir.</p>
        </div>

        <div class="appt-tabs" role="tablist">
          <button class="appt-tab active" data-status="upcoming">À venir</button>
          <button class="appt-tab" data-status="done">Passés</button>
          <button class="appt-tab" data-status="cancelled">Annulés</button>
        </div>

        <div class="appt-list" id="appointmentsList"></div>

        <div class="empty-state" id="appointmentsEmptyState" style="display:none;">
          <div class="empty-state-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2" /><path d="M16 2v4M8 2v4M3 10h18" /></svg>
          </div>
          <h3 id="appointmentsEmptyTitle">Aucun rendez-vous</h3>
          <p id="appointmentsEmptyText">Vous n'avez aucune réservation dans cette catégorie pour le moment.</p>
          <a href="search.html" class="btn btn-primary">Réserver un artisan</a>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom" style="margin-top:0;padding-top:1.5rem;">
          <p>© 2026 ArtisanConnect. Tous droits réservés.</p>
          <button class="back-to-top" aria-label="Retourner en haut de la page">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m4 12 1.41 1.41L11 7.83V20h2V7.83l5.58 5.59L20 12l-8-8z" /></svg>
          </button>
        </div>
      </div>
    </footer>

    <div id="bottom-nav-container"></div>
    <div id="booking-modal-container"></div>
    <div id="login-modal-container"></div>
    <div class="toast-stack" id="toastStack"></div>

    <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadIncludes({ activePage: "appointments.html" });
      initAppointmentsPage();
    </script>
  </body>
</html>
