<!--onboarding.html -->
<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenue sur ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="onboarding-overlay" id="onboardingOverlay">
      <div class="onboarding-modal" id="onboardingModal">
        <div
          style="
            text-align: center;
            padding: 2rem;
            color: var(--ink-faint);
            font-size: 0.9rem;
          "
        >
          Chargement…
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/data/artisans.js"></script>
    <script src="js/data/dashboard-mock.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadTheme();
      // Un seul loadIncludes
      loadIncludes({ activePage: "dashboard.html" });

      // État de l'onboarding
      const ob = {
        step: 1,
        type: null, // "solo" | "entreprise"
        category: null,
        service: { name: "", price: "", duration: "" },
      };

      // Sera rempli depuis Supabase (vrai artisan connecté)
      let _session = null;
      let _realArtisanId = null;

      // -------------------------------------------------------
      // Initialisation : vérifier la session et l'artisan existant
      // -------------------------------------------------------
      async function initOnboarding() {
        const modal = document.getElementById("onboardingModal");

        try {
          const { data: sessionData } = await SupabaseAPI.auth.getSession();
          _session = sessionData?.session || null;

          if (!_session) {
            // Pas connecté → rediriger vers auth
            window.location.href = "auth.html";
            return;
          }

          // Vérifie si l'artisan a déjà des services (= déjà passé par l'onboarding)
          const { data: artisans } = await SupabaseAPI.artisans.getByOwner(
            _session.user.id,
          );

          if (artisans && artisans.length > 0) {
            const existing = artisans[0];
            _realArtisanId = existing.id;

            const { data: services } = await SupabaseAPI.services.getByArtisan(
              existing.id,
              false,
            );

            if (services && services.length > 0) {
              // A déjà des services → l'onboarding est terminé, rediriger
              window.location.href = "dashboard.html?persona=solo";
              return;
            }
          }
        } catch (e) {
          console.warn("Erreur init onboarding:", e.message);
        }

        // Lancer l'affichage
        renderStep();
      }

      // -------------------------------------------------------
      // Rendu des étapes
      // -------------------------------------------------------
      function renderStep() {
        const modal = document.getElementById("onboardingModal");

        const dots = [1, 2, 3]
          .map(
            (n) =>
              `<div class="onboarding-step-dot ${
                n === ob.step ? "active" : n < ob.step ? "done" : ""
              }"></div>`,
          )
          .join("");

        if (ob.step === 1) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Bienvenue 👋</div>
            <div class="onboarding-subtitle">Pour personnaliser votre espace, dites-nous qui vous êtes.</div>
            <div class="onboarding-choice-grid">
              <div class="onboarding-choice ${ob.type === "solo" ? "selected" : ""}" data-type="solo">
                <div class="onboarding-choice-icon">🧑‍🔧</div>
                <div class="onboarding-choice-label">Artisan indépendant</div>
                <div class="onboarding-choice-sub">Je travaille seul</div>
              </div>
              <div class="onboarding-choice ${ob.type === "entreprise" ? "selected" : ""}" data-type="entreprise">
                <div class="onboarding-choice-icon">🏪</div>
                <div class="onboarding-choice-label">Entreprise ou salon</div>
                <div class="onboarding-choice-sub">J'ai une équipe</div>
              </div>
            </div>
            <div class="onboarding-actions">
              <span style="font-size:.8rem;color:var(--ink-faint);">Étape 1 sur 3</span>
              <button type="button" class="btn btn-primary" id="obNext1" ${!ob.type ? "disabled" : ""}>Continuer →</button>
            </div>`;

          modal.querySelectorAll(".onboarding-choice").forEach((el) => {
            el.addEventListener("click", () => {
              ob.type = el.dataset.type;
              renderStep();
            });
          });
          modal.querySelector("#obNext1").addEventListener("click", () => {
            ob.step = 2;
            renderStep();
          });
        } else if (ob.step === 2) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Votre métier</div>
            <div class="onboarding-subtitle">Quel est votre métier principal ? Vous pourrez en ajouter d'autres plus tard.</div>
            <div class="onboarding-field">
              <label>Choisissez votre métier</label>
              <select id="obCatSelect">
                <option value="">— Sélectionner —</option>
                ${CATEGORIES.map(
                  (c) =>
                    `<option value="${c.slug}" ${
                      ob.category === c.slug ? "selected" : ""
                    }>${c.label}</option>`,
                ).join("")}
              </select>
            </div>
            <div class="onboarding-actions">
              <button type="button" class="btn btn-ghost" id="obBack2">← Retour</button>
              <button type="button" class="btn btn-primary" id="obNext2" ${
                !ob.category ? "disabled" : ""
              }>Continuer →</button>
            </div>`;

          const sel = modal.querySelector("#obCatSelect");
          const next2 = modal.querySelector("#obNext2");
          sel.addEventListener("change", () => {
            ob.category = sel.value;
            next2.disabled = !ob.category;
          });
          modal.querySelector("#obBack2").addEventListener("click", () => {
            ob.step = 1;
            renderStep();
          });
          next2.addEventListener("click", () => {
            ob.step = 3;
            renderStep();
          });
        } else if (ob.step === 3) {
          modal.innerHTML = `
            <div class="onboarding-steps">${dots}</div>
            <div class="onboarding-title">Votre premier service</div>
            <div class="onboarding-subtitle">Ajoutez au moins un service pour que les clients puissent vous réserver.</div>
            <div class="onboarding-field">
              <label>Nom du service</label>
              <input type="text" id="obSvcName" placeholder="Ex. Coupe de cheveux" value="${ob.service.name}" />
            </div>
            <div class="onboarding-field">
              <label>Prix (FCFA)</label>
              <input type="number" id="obSvcPrice" placeholder="Ex. 2500" value="${ob.service.price}" min="0" step="500" />
            </div>
            <div class="onboarding-field">
              <label>Durée (minutes)</label>
              <input type="number" id="obSvcDuration" placeholder="Ex. 30" value="${ob.service.duration}" min="5" step="5" />
            </div>
            <p id="obError" style="color:var(--danger);font-size:.8rem;min-height:1.2rem;"></p>
            <div class="onboarding-actions">
              <button type="button" class="btn btn-ghost" id="obBack3">← Retour</button>
              <button type="button" class="btn btn-primary" id="obFinish">Commencer 🎉</button>
            </div>`;

          modal.querySelector("#obBack3").addEventListener("click", () => {
            ob.step = 2;
            renderStep();
          });

          modal
            .querySelector("#obFinish")
            .addEventListener("click", async () => {
              const nameInput = modal.querySelector("#obSvcName");
              const priceInput = modal.querySelector("#obSvcPrice");
              const durationInput = modal.querySelector("#obSvcDuration");
              const errorEl = modal.querySelector("#obError");
              const finishBtn = modal.querySelector("#obFinish");

              const name = nameInput.value.trim();
              const price = Number(priceInput.value) || 0;
              const duration = Number(durationInput.value) || 30;

              if (!name) {
                errorEl.textContent = "Veuillez nommer votre service.";
                nameInput.focus();
                return;
              }

              finishBtn.disabled = true;
              finishBtn.textContent = "Création en cours…";
              errorEl.textContent = "";

              try {
                let artisanId = _realArtisanId;

                // Si l'artisan n'existe pas encore en base, le créer maintenant
                if (!artisanId && _session?.user) {
                  const { user: profile } = await SupabaseAPI.auth.getUser();
                  const { data: newArtisan, error: createErr } =
                    await SupabaseAPI.artisans.create({
                      owner_id: _session.user.id,
                      name: profile?.full_name || "Mon activité",
                      city: "",
                      currency: "FCFA",
                      is_team: ob.type === "entreprise",
                      status: "actif",
                    });

                  if (createErr) throw new Error(createErr.message);
                  artisanId = newArtisan[0].id;
                  _realArtisanId = artisanId;
                }

                // Créer le premier service
                if (artisanId) {
                  const { error: svcErr } = await SupabaseAPI.services.create({
                    artisan_id: artisanId,
                    name,
                    price,
                    duration_min: duration,
                    is_active: true,
                  });
                  if (svcErr) throw new Error(svcErr.message);
                }

                // Rediriger vers le dashboard
                const personaKey =
                  ob.type === "entreprise" ? "responsable" : "solo";
                window.location.href = `dashboard.html?persona=${personaKey}`;
              } catch (err) {
                console.error("Onboarding error:", err);
                errorEl.textContent =
                  "Une erreur est survenue : " + err.message + ". Réessayez.";
                finishBtn.disabled = false;
                finishBtn.textContent = "Commencer 🎉";
              }
            });
        }
      }

      // Lancer
      initOnboarding();
    </script>
  </body>
</html>
