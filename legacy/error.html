<!-- error.html -->

<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page introuvable — ArtisanConnect</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div id="header-container"></div>

    <main class="main-content">
      <div class="container">
        <div class="error-page fade-in">
          <div class="error-code">404</div>
          <h1>Cette page a pris un jour de congé</h1>
          <p>
            La page que vous cherchez n'existe pas ou a été déplacée. Vérifiez
            l'adresse ou repartez de l'accueil.
          </p>

          <div class="search-container" style="margin-top: 1.5rem">
            <div class="search-box">
              <svg
                class="search-icon"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="m21 21-4.35-4.35" />
              </svg>
              <input
                type="search"
                class="search-input"
                placeholder="Rechercher un artisan…"
                id="errorSearchInput"
              />
              <button
                class="search-submit"
                aria-label="Rechercher"
                id="errorSearchSubmit"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.2"
                >
                  <path d="M5 12h14M13 6l6 6-6 6" />
                </svg>
              </button>
            </div>
          </div>

          <div class="error-actions">
            <a href="index.html" class="btn btn-primary">Retour à l'accueil</a>
            <a href="search.html" class="btn btn-outline"
              >Voir tous les artisans</a
            >
          </div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="container">
        <div class="footer-bottom" style="margin-top: 0; padding-top: 1.5rem">
          <p>© 2026 ArtisanConnect. Tous droits réservés.</p>
        </div>
      </div>
    </footer>

    <div id="bottom-nav-container"></div>

    <script src="js/data/artisans.js"></script>
    <script src="js/main.js"></script>
    <script>
      loadIncludes({ activePage: "error.html" });

      function goToSearch() {
        const q = document.getElementById("errorSearchInput").value.trim();
        window.location.href = q
          ? `search.html?q=${encodeURIComponent(q)}`
          : "search.html";
      }
      document
        .getElementById("errorSearchSubmit")
        .addEventListener("click", goToSearch);
      document
        .getElementById("errorSearchInput")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") goToSearch();
        });
    </script>
  </body>
</html>
