<!-- components\header.html -->

<header class="header">
  <div class="container">
    <div class="header-content">
      <a href="index.html" class="logo-container">
        <span class="logo-mark">AC</span>
        <span class="logo-text">ArtisanConnect</span>
      </a>

      <nav class="header-nav" aria-label="Navigation principale">
        <a href="index.html" data-page="index.html">Accueil</a>
        <a href="search.html" data-page="search.html">Trouver un artisan</a>
        <a href="appointments.html" data-page="appointments.html"
          >Mes rendez-vous</a
        >
        <a href="favorites.html" data-page="favorites.html">Favoris</a>
        <a href="messages.html" data-page="messages.html">Messagerie</a>
      </nav>

      <div class="header-actions">
        <a href="dashboard.html" class="artisan-cta" data-page="dashboard.html">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            width="16"
            height="16"
          >
            <path d="M12 5v14M5 12h14" />
          </svg>
          Espace artisan
        </a>

        <button
          class="theme-switch"
          type="button"
          role="switch"
          id="themeToggle"
          aria-label="Changer de thème"
        >
          <span class="theme-switch-track">
            <span class="theme-switch-icon sun">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5" />
                <path
                  d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
                />
              </svg>
            </span>
            <span class="theme-switch-icon moon">
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="currentColor"
              >
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
              </svg>
            </span>
          </span>
        </button>

        <div class="language-wrapper">
          <button
            class="lang-trigger"
            id="langTrigger"
            aria-label="Choisir la langue"
          >
            <img
              src="https://flagcdn.com/w40/fr.png"
              alt=""
              class="lang-flag-img"
            />
            <span class="lang-text">FR</span>
          </button>
          <ul class="lang-dropdown" id="langDropdown">
            <li data-lang="fr-FR" class="active">
              <span style="display: flex; align-items: center; gap: 0.5rem">
                <img
                  src="https://flagcdn.com/w40/fr.png"
                  alt=""
                  class="lang-flag-img"
                />
                <span class="lang-name">Français</span>
              </span>
              <svg
                class="lang-check active"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </li>
            <li data-lang="en-US">
              <span style="display: flex; align-items: center; gap: 0.5rem">
                <img
                  src="https://flagcdn.com/w40/gb.png"
                  alt=""
                  class="lang-flag-img"
                />
                <span class="lang-name">English</span>
              </span>
              <svg
                class="lang-check"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </li>
            <li data-lang="pt-BR">
              <span style="display: flex; align-items: center; gap: 0.5rem">
                <img
                  src="https://flagcdn.com/w40/pt.png"
                  alt=""
                  class="lang-flag-img"
                />
                <span class="lang-name">Português</span>
              </span>
              <svg
                class="lang-check"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.5"
              >
                <path d="M20 6 9 17l-5-5" />
              </svg>
            </li>
          </ul>
        </div>

        <div class="profile-wrapper">
          <!-- Non connecté -->
          <a
            href="auth.html"
            class="btn btn-outline"
            id="loginBtn"
            style="padding: 0.4rem 1rem"
            >Se connecter</a
          >

          <!-- Connecté -->
          <button
            class="profile-trigger"
            id="profileTrigger"
            aria-label="Compte"
            style="display: none"
          >
            <span id="profileInitials">MJ</span>
          </button>

          <div class="profile-dropdown" id="profileDropdown">
            <a href="dashboard.html">Espace artisan</a>
            <a href="appointments.html">Mes rendez-vous</a>
            <a href="messages.html">Messagerie</a>
            <a href="favorites.html">Favoris</a>
            <button id="logoutBtn" class="cookie-btn">Se déconnecter</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
