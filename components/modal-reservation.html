============================================
COMPOSANT : Modale de réservation
============================================
-->
<style>
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    background: rgba(20, 20, 15, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  @media (min-width: 640px) {
    .modal-overlay {
      align-items: center;
    }
  }

  .modal-container {
    width: 100%;
    max-width: 640px;
    max-height: calc(100% - 2rem);
    background: var(--bg-elevated);
    border-radius: var(--r-card);
    box-shadow: var(--shadow-lg);
    margin: 0.5rem;
    display: flex;
    flex-direction: column;
    transform: translateY(20px) scale(0.96);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    overflow: hidden;
  }

  .modal-overlay.active .modal-container {
    transform: translateY(0) scale(1);
  }

  @media (min-width: 640px) {
    .modal-container {
      margin: 1rem 1.5rem;
      max-height: calc(100% - 6rem);
    }
  }

  .modal-close {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    z-index: 50;
    width: 38px;
    height: 38px;
    border-radius: var(--r-pill);
    background: var(--bg-sunken);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease, color 0.2s ease;
    color: var(--ink);
  }

  .modal-close:hover {
    background: var(--danger);
    color: #fff;
  }

  .modal-close svg {
    width: 18px;
    height: 18px;
  }

  .modal-header {
    flex-shrink: 0;
    background: var(--bg-sunken);
    padding: 1.1rem 1rem 0.85rem;
    border-bottom: 1px solid var(--border);
  }

  .modal-header-title {
    text-align: center;
    margin-bottom: 0.85rem;
  }

  .modal-header-title h1 {
    font-size: 1.05rem;
    font-weight: 700;
  }

  .modal-header-title span {
    display: block;
    font-size: 0.78rem;
    color: var(--ink-faint);
    margin-top: 0.15rem;
  }

  .date-navigation {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.4rem;
  }

  .date-nav-btn {
    width: 36px;
    height: 36px;
    border-radius: var(--r-pill);
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s ease, opacity 0.15s ease;
    color: var(--ink);
    flex-shrink: 0;
  }

  .date-nav-btn:hover:not(:disabled) {
    transform: scale(1.06);
  }

  .date-nav-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  .date-nav-btn svg {
    width: 18px;
    height: 18px;
  }

  .date-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.3rem;
    width: 100%;
  }

  .date-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.45rem 0.2rem;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.18s ease;
    user-select: none;
    background: var(--bg-elevated);
  }

  .date-item:hover:not(.date-selected) {
    border-color: var(--border-strong);
  }

  .date-item .day-label {
    font-size: 0.68rem;
    color: var(--ink-faint);
  }

  .date-item .day-number {
    font-family: var(--font-mono);
    font-size: 0.9rem;
    font-weight: 600;
    margin-top: 0.3rem;
  }

  .date-item.date-selected {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-ink);
  }

  .date-item.date-selected .day-label {
    color: color-mix(in srgb, var(--accent-ink) 75%, transparent);
  }

  .modal-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.5rem 1rem 1.25rem;
    overflow-y: auto;
  }

  .professional-section {
    padding: 0.75rem 0;
  }

  .professional-section h2 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-bottom: 0.85rem;
  }

  .professional-scroll {
    overflow: hidden;
    width: 100%;
  }

  .professional-track {
    display: flex;
    gap: 1rem;
    overflow-x: auto;
    padding: 0.2rem 0.2rem 0.5rem;
    scroll-snap-type: x mandatory;
    scrollbar-width: none;
  }

  .professional-track::-webkit-scrollbar {
    display: none;
  }

  .professional-item {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    min-width: 84px;
    scroll-snap-align: start;
    transition: transform 0.15s ease;
  }

  .professional-item:hover {
    transform: scale(1.03);
  }

  .professional-avatar-wrapper {
    position: relative;
    padding: 0.2rem;
  }

  .professional-avatar {
    width: 56px;
    height: 56px;
    border-radius: var(--r-pill);
    object-fit: cover;
    border: 2px solid var(--border);
  }

  .professional-avatar.ring-active {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent-soft);
  }

  .professional-rating {
    position: absolute;
    top: -2px;
    right: -2px;
    display: flex;
    align-items: center;
    gap: 0.15rem;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: var(--r-pill);
    padding: 0.1rem 0.35rem;
    font-size: 0.62rem;
    font-weight: 600;
  }

  .professional-rating svg {
    width: 10px;
    height: 10px;
    color: var(--star);
  }

  .professional-name {
    font-size: 0.75rem;
    text-align: center;
    font-weight: 500;
  }

  .info-message {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.9rem 1rem;
    background: var(--bg-sunken);
    border-radius: var(--r-sm);
    color: var(--ink-soft);
    font-size: 0.82rem;
  }

  .info-message svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    color: var(--ink-faint);
  }

  .modal-divider {
    height: 1px;
    background: var(--border);
    border: none;
    margin: 0.4rem 0;
  }

  .slot-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.5rem;
  }

  @media (min-width: 480px) {
    .slot-grid {
      grid-template-columns: repeat(4, 1fr);
    }
  }

  .slot-btn {
    padding: 0.6rem 0.4rem;
    border-radius: var(--r-sm);
    border: 1.5px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.82rem;
    font-weight: 600;
    text-align: center;
    transition: all 0.15s ease;
  }

  .slot-btn:hover {
    border-color: var(--border-strong);
  }

  .slot-btn.slot-selected {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-ink);
  }

  .modal-footer {
    flex-shrink: 0;
    padding: 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    background: var(--bg-elevated);
  }

  .modal-footer-summary {
    font-size: 0.8rem;
    color: var(--ink-soft);
    line-height: 1.4;
  }

  .modal-footer-summary strong {
    color: var(--ink);
    display: block;
    font-size: 0.9rem;
  }

  .modal-confirm-btn {
    flex-shrink: 0;
    background: var(--accent);
    color: var(--accent-ink);
    padding: 0.75rem 1.5rem;
    border-radius: var(--r-pill);
    font-weight: 700;
    font-size: 0.88rem;
    transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
  }

  .modal-confirm-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .modal-confirm-btn:not(:disabled):hover {
    background: var(--accent-strong);
  }

  .modal-confirm-btn:not(:disabled):active {
    transform: scale(0.97);
  }
</style>

<div class="modal-overlay" id="bookingModal">
  <div class="modal-container">
    <button class="modal-close" id="closeModal" aria-label="Fermer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12" /></svg>
    </button>

    <header class="modal-header">
      <div class="modal-header-title">
        <h1 id="modalMonthYear">Juillet 2026</h1>
        <span id="modalArtisanName">Choisissez une date</span>
      </div>

      <div class="date-navigation">
        <button class="date-nav-btn" id="prevWeek" disabled>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20z" /></svg>
        </button>
        <div class="date-grid" id="dateGrid"></div>
        <button class="date-nav-btn" id="nextWeek">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m12 4-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z" /></svg>
        </button>
      </div>
    </header>

    <div class="modal-body">
      <div class="professional-section">
        <h2>Choisir un professionnel</h2>
        <div class="professional-scroll">
          <div class="professional-track" id="professionalTrack"></div>
        </div>
      </div>

      <hr class="modal-divider" />

      <div id="slotsWrapper">
        <div class="info-message" id="slotsInfoMessage">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>
          <p>Choisissez une date et un professionnel pour voir les créneaux disponibles.</p>
        </div>
        <div class="slot-grid" id="slotGrid" style="display:none;"></div>
      </div>
    </div>

    <footer class="modal-footer">
      <div class="modal-footer-summary" id="modalSummary">
        <strong>Aucun créneau sélectionné</strong>
        Sélectionnez un horaire pour continuer
      </div>
      <button class="modal-confirm-btn" id="confirmBooking" disabled>Confirmer</button>
    </footer>
  </div>
</div>

<script>
  (function () {
    "use strict";

    const modal = document.getElementById("bookingModal");
    const closeBtn = document.getElementById("closeModal");
    const dateGrid = document.getElementById("dateGrid");
    const prevBtn = document.getElementById("prevWeek");
    const nextBtn = document.getElementById("nextWeek");
    const professionalTrack = document.getElementById("professionalTrack");
    const monthYearDisplay = document.getElementById("modalMonthYear");
    const artisanNameDisplay = document.getElementById("modalArtisanName");
    const slotGrid = document.getElementById("slotGrid");
    const slotsInfo = document.getElementById("slotsInfoMessage");
    const summary = document.getElementById("modalSummary");
    const confirmBtn = document.getElementById("confirmBooking");

    const DEFAULT_PROFESSIONALS = [
      { id: 1, name: "Équipe complète", rating: 4.9, image: "https://images.unsplash.com/photo-1580489944761-15a19d654956?w=150&h=150&fit=crop" },
      { id: 2, name: "Responsable", rating: 4.8, image: "https://images.unsplash.com/photo-1568602471122-7832951cc4c5?w=150&h=150&fit=crop" },
      { id: 3, name: "Assistant", rating: 4.7, image: "https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=150&h=150&fit=crop" },
    ];

    const SLOTS = ["08:00", "09:00", "10:30", "11:30", "14:00", "15:00", "16:30", "17:30"];

    let currentDate = new Date();
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    currentDate = new Date(today);

    let state = {
      artisanName: "",
      serviceName: "",
      date: null,
      professional: null,
      slot: null,
    };

    function getWeekDates(startDate) {
      const dates = [];
      const d = new Date(startDate);
      const day = d.getDay();
      d.setDate(d.getDate() - day);
      for (let i = 0; i < 7; i++) {
        const date = new Date(d);
        date.setDate(date.getDate() + i);
        dates.push(date);
      }
      return dates;
    }

    function updateMonthYearDisplay() {
      const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      const weekDates = getWeekDates(currentDate);
      const first = weekDates[0];
      const last = weekDates[weekDates.length - 1];
      const fm = monthNames[first.getMonth()];
      const lm = monthNames[last.getMonth()];
      monthYearDisplay.textContent = fm === lm ? `${fm} ${first.getFullYear()}` : `${fm} / ${lm} ${first.getFullYear()}`;
    }

    function renderDates() {
      const weekDates = getWeekDates(currentDate);
      dateGrid.innerHTML = "";
      const dayNames = ["Di", "Lu", "Ma", "Me", "Je", "Ve", "Sa"];

      weekDates.forEach((date) => {
        const iso = date.toISOString().split("T")[0];
        const isPast = date < today;
        const isSelected = state.date === iso;

        const div = document.createElement("div");
        div.className = `date-item ${isSelected ? "date-selected" : ""}`;
        if (isPast) {
          div.style.opacity = "0.35";
          div.style.cursor = "not-allowed";
        }
        div.dataset.date = iso;
        div.innerHTML = `
          <span class="day-label">${dayNames[date.getDay()]}</span>
          <span class="day-number">${String(date.getDate()).padStart(2, "0")}</span>
        `;

        if (!isPast) {
          div.addEventListener("click", function () {
            document.querySelectorAll(".date-item").forEach((el) => el.classList.remove("date-selected"));
            this.classList.add("date-selected");
            state.date = iso;
            state.slot = null;
            renderSlots();
            updateSummary();
          });
        }

        dateGrid.appendChild(div);
      });

      prevBtn.disabled = weekDates[0].toDateString() === today.toDateString();
      updateMonthYearDisplay();
    }

    function renderProfessionals() {
      professionalTrack.innerHTML = "";
      DEFAULT_PROFESSIONALS.forEach((pro, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "professional-item";
        btn.dataset.id = pro.id;

        btn.innerHTML = `
          <div class="professional-avatar-wrapper">
            <img src="${pro.image}" alt="${pro.name}" class="professional-avatar">
            <div class="professional-rating">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              <span>${pro.rating}</span>
            </div>
          </div>
          <div class="professional-name">${pro.name}</div>
        `;

        btn.addEventListener("click", function () {
          document.querySelectorAll(".professional-avatar").forEach((el) => el.classList.remove("ring-active"));
          this.querySelector(".professional-avatar").classList.add("ring-active");
          state.professional = pro.name;
          state.slot = null;
          renderSlots();
          updateSummary();
        });

        professionalTrack.appendChild(btn);
      });
    }

    function renderSlots() {
      if (!state.date || !state.professional) {
        slotsInfo.style.display = "flex";
        slotGrid.style.display = "none";
        return;
      }
      slotsInfo.style.display = "none";
      slotGrid.style.display = "grid";
      slotGrid.innerHTML = "";

      SLOTS.forEach((slot) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "slot-btn";
        btn.textContent = slot;
        btn.addEventListener("click", () => {
          document.querySelectorAll(".slot-btn").forEach((b) => b.classList.remove("slot-selected"));
          btn.classList.add("slot-selected");
          state.slot = slot;
          updateSummary();
        });
        slotGrid.appendChild(btn);
      });
    }

    function formatDateFr(iso) {
      const d = new Date(iso + "T00:00:00");
      return d.toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
    }

    function updateSummary() {
      if (state.date && state.professional && state.slot) {
        summary.innerHTML = `<strong>${formatDateFr(state.date)} à ${state.slot}</strong>Avec ${state.professional}`;
        confirmBtn.disabled = false;
      } else {
        summary.innerHTML = `<strong>Aucun créneau sélectionné</strong>Sélectionnez un horaire pour continuer`;
        confirmBtn.disabled = true;
      }
    }

    function updateWeek(direction) {
      const newDate = new Date(currentDate);
      newDate.setDate(newDate.getDate() + direction * 7);
      currentDate = newDate;
      renderDates();
    }

    prevBtn.addEventListener("click", () => updateWeek(-1));
    nextBtn.addEventListener("click", () => updateWeek(1));

    function openModal(context) {
      context = context || {};
      state = {
        artisanName: context.artisanName || "",
        serviceName: context.serviceName || "",
        date: null,
        professional: null,
        slot: null,
      };
      artisanNameDisplay.textContent = state.serviceName
        ? `${state.serviceName}${state.artisanName ? " · " + state.artisanName : ""}`
        : "Choisissez une date et un créneau";

      currentDate = new Date(today);
      modal.classList.add("active");
      document.body.style.overflow = "hidden";
      renderDates();
      renderProfessionals();
      renderSlots();
      updateSummary();
    }

    function closeModal() {
      modal.classList.remove("active");
      document.body.style.overflow = "";
    }

    closeBtn.addEventListener("click", closeModal);
    modal.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.classList.contains("active")) closeModal();
    });

    confirmBtn.addEventListener("click", () => {
      if (confirmBtn.disabled) return;
      closeModal();
      if (typeof window.showToast === "function") {
        window.showToast(`Rendez-vous confirmé pour le ${formatDateFr(state.date)} à ${state.slot}.`);
      }
    });

    window.openBookingModal = openModal;
    window.closeBookingModal = closeModal;

    // Délégation d'événements pour tous les boutons de réservation, y compris ceux ajoutés dynamiquement
    document.addEventListener("click", function (e) {
      const target = e.target.closest(".booking-trigger");
      if (!target) return;
      e.preventDefault();
      e.stopPropagation();
      openModal({
        artisanName: target.dataset.artisanName || "",
        serviceName: target.dataset.serviceName || "",
      });
    });
  })();
</script>
